name: tiep_song
description: Tiếp Sóng — ứng dụng cứu trợ thiên tai offline-first cho Việt Nam.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.8

  # Navigation
  go_router: ^14.8.1

  # Network (dùng khi có sóng — sync lên Spring Boot backend)
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0

  # Offline mesh — lõi của app, hoạt động không cần internet
  bridgefy: ^1.1.11

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local storage — nguồn sự thật khi offline, KHÔNG phải chỉ là cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Serialization
  json_annotation: ^4.9.0

  # Vị trí — bắt buộc để định vị người cần cứu trợ
  geolocator: ^13.0.2

  # Phát hiện có/mất mạng để quyết định lúc nào sync lên backend
  connectivity_plus: ^6.1.3

  # Logging
  talker_flutter: ^4.7.2
  talker_bloc_logger: ^4.7.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  share_plus: ^11.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
